<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="340" viewBox="0 0 440 340">
  <defs>
    <!-- 4-pointed sparkle -->
    <g id="sp">
      <path d="M0-8 L2-2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2-2Z" fill="#c9a227" stroke="none"/>
    </g>
    <!-- Small sparkle -->
    <g id="sps">
      <path d="M0-5 L1.2-1.2 L5 0 L1.2 1.2 L0 5 L-1.2 1.2 L-5 0 L-1.2-1.2Z" fill="#c9a227" stroke="none"/>
    </g>
    <!-- Tiny dot -->
    <circle id="dot" r="2.5" fill="#c9a227"/>

    <!-- Stacked books (3) -->
    <g id="books3" fill="none" stroke="#c9a227" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <!-- bottom book -->
      <rect x="-32" y="3" width="64" height="13" rx="2.5"/>
      <line x1="-20" y1="3" x2="-20" y2="16"/>
      <line x1="8" y1="3" x2="8" y2="16"/>
      <!-- middle book -->
      <rect x="-28" y="-12" width="58" height="13" rx="2.5"/>
      <line x1="-16" y1="-12" x2="-16" y2="1"/>
      <line x1="10" y1="-12" x2="10" y2="1"/>
      <!-- top book -->
      <rect x="-24" y="-27" width="50" height="13" rx="2.5"/>
      <line x1="-13" y1="-27" x2="-13" y2="-14"/>
      <!-- glow shadow lines beneath stack -->
      <ellipse cx="0" cy="16" rx="30" ry="4" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Open book with lines -->
    <g id="openbook" fill="none" stroke="#c9a227" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <!-- left page -->
      <path d="M0,4 L0,42 L-42,37 C-47,36 -50,32 -50,27 L-50,0 C-50,-5 -47,-8 -42,-7 Z"/>
      <!-- right page -->
      <path d="M0,4 L0,42 L42,37 C47,36 50,32 50,27 L50,0 C50,-5 47,-8 42,-7 Z"/>
      <!-- left page lines -->
      <line x1="-40" y1="8"  x2="-5" y2="8"/>
      <line x1="-40" y1="17" x2="-5" y2="17"/>
      <line x1="-40" y1="26" x2="-5" y2="26"/>
      <!-- right page lines -->
      <line x1="5" y1="8"  x2="40" y2="8"/>
      <line x1="5" y1="17" x2="40" y2="17"/>
      <line x1="5" y1="26" x2="40" y2="26"/>
      <!-- shadow beneath -->
      <ellipse cx="0" cy="42" rx="36" ry="4.5" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Sunburst rays -->
    <g id="rays" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="-14" x2="0"   y2="-22"/>
      <line x1="10" y1="-10" x2="16" y2="-16"/>
      <line x1="-10" y1="-10" x2="-16" y2="-16"/>
      <line x1="14" y1="-2"  x2="22" y2="-4"/>
      <line x1="-14" y1="-2" x2="-22" y2="-4"/>
      <line x1="12" y1="7"   x2="19"  y2="11"/>
      <line x1="-12" y1="7"  x2="-19" y2="11"/>
    </g>

    <!-- Simplified handshake -->
    <g id="shake" fill="none" stroke="#c9a227" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- left arm -->
      <path d="M-48,10 L-20,10 L-14,4 C-10,0 -5,-1 0,1"/>
      <!-- right arm -->
      <path d="M48,10 L20,10 L14,4 C10,0 5,-1 0,1"/>
      <!-- clasp / hands -->
      <path d="M-14,4 C-9,8 -4,9 0,7 C4,9 9,8 14,4"/>
      <!-- finger lines left -->
      <path d="M-20,10 L-22,18 C-20,22 -14,22 -12,18 L-10,12"/>
      <!-- finger lines right -->
      <path d="M20,10 L22,18 C20,22 14,22 12,18 L10,12"/>
    </g>

    <!-- Pencil/pen -->
    <g id="pen" fill="none" stroke="#c9a227" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-10" y1="-18" x2="10" y2="18"/>
      <path d="M10,18 L7,24 L13,21 Z" fill="#c9a227" stroke="none"/>
      <line x1="-8" y1="-15" x2="-11" y2="-21"/>
      <line x1="-9" y1="-16" x2="9" y2="16"/>
    </g>
  </defs>

  <!-- ==============================
       TILE CONTENTS
  ================================ -->

  <!-- TOP ROW -->

  <!-- Handshake + books, top-left -->
  <g transform="translate(75,70)">
    <use href="#rays" transform="translate(0,10)"/>
    <use href="#shake"/>
    <use href="#books3" transform="translate(0,38)"/>
  </g>

  <!-- Open book + rays, top-center -->
  <g transform="translate(220,58)">
    <use href="#rays" transform="translate(0,4)"/>
    <use href="#openbook"/>
  </g>

  <!-- Book stack only, top-right -->
  <g transform="translate(370,60)">
    <use href="#rays" transform="translate(0,-27)"/>
    <use href="#books3"/>
  </g>

  <!-- MID ROW -->

  <!-- Book stack + rays, mid-left -->
  <g transform="translate(42,192)">
    <use href="#rays" transform="translate(0,-27)"/>
    <use href="#books3"/>
  </g>

  <!-- Handshake + books, mid-center -->
  <g transform="translate(205,182)">
    <use href="#rays" transform="translate(0,10)"/>
    <use href="#shake"/>
    <use href="#books3" transform="translate(0,38)"/>
  </g>

  <!-- Open book, mid-right -->
  <g transform="translate(375,190)">
    <use href="#openbook"/>
  </g>

  <!-- BOTTOM ROW -->

  <!-- Open book + pen, bottom-left -->
  <g transform="translate(80,298)">
    <use href="#openbook"/>
    <use href="#pen" transform="translate(8,-12)"/>
  </g>

  <!-- Handshake + books, bottom-center -->
  <g transform="translate(240,293)">
    <use href="#shake"/>
    <use href="#books3" transform="translate(0,38)"/>
  </g>

  <!-- Book stack, bottom-right -->
  <g transform="translate(390,296)">
    <use href="#rays" transform="translate(0,-27)"/>
    <use href="#books3"/>
  </g>

  <!-- SPARKLES & DOTS -->
  <use href="#sp"  transform="translate(155,28)"/>
  <use href="#sps" transform="translate(308,22)"/>
  <use href="#sp"  transform="translate(425,78)"/>
  <use href="#sps" transform="translate(138,128)"/>
  <use href="#sp"  transform="translate(315,115)"/>
  <use href="#sps" transform="translate(22,118)"/>
  <use href="#sps" transform="translate(170,232)"/>
  <use href="#sp"  transform="translate(330,238)"/>
  <use href="#sps" transform="translate(432,248)"/>
  <use href="#sp"  transform="translate(55,338)"/>
  <use href="#sps" transform="translate(168,328)"/>
  <use href="#sp"  transform="translate(415,330)"/>
  <use href="#sps" transform="translate(440,158)"/>
  <use href="#sp"  transform="translate(148,328)"/>

  <use href="#dot" transform="translate(158,82)"/>
  <use href="#dot" transform="translate(298,162)"/>
  <use href="#dot" transform="translate(432,162)"/>
  <use href="#dot" transform="translate(104,242)"/>
  <use href="#dot" transform="translate(340,332)"/>
  <use href="#dot" transform="translate(438,20)"/>
  <use href="#dot" transform="translate(8,52)"/>
  <use href="#dot" transform="translate(8,275)"/>
</svg>
